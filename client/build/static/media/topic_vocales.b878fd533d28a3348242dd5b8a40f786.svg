<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <circle cx="32" cy="32" r="30" fill="#EFF6FF" />

  <!-- Tarjeta I (Izquierda) -->
  <g transform="translate(6, 17) rotate(-15 10 15)">
    <rect x="0" y="0" width="20" height="26" rx="2" fill="#93C5FD" />
    <text x="10" y="18" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E3A8A" text-anchor="middle">i</text>
  </g>

  <!-- Tarjeta E (Derecha) -->
  <g transform="translate(38, 17) rotate(15 10 15)">
    <rect x="0" y="0" width="20" height="26" rx="2" fill="#FFB74D" />
    <text x="10" y="18" font-family="sans-serif" font-size="16" font-weight="bold" fill="#E65100" text-anchor="middle">e</text>
  </g>

  <!-- Tarjeta A (Centro, enfrente) -->
  <g transform="translate(20, 17)">
    <rect x="0" y="0" width="24" height="30" rx="3" fill="#1E3A8A" />
    <rect x="2" y="2" width="20" height="26" rx="2" fill="none" stroke="#EFF6FF" stroke-width="1" opacity="0.3" />
    <text x="12" y="21" font-family="sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">a</text>
  </g>
</svg>
