<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shadow-card" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-coin" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48"/> <!-- Rose -->
      <stop offset="100%" stop-color="#9F1239"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/> <!-- Emerald -->
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cardBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <radialGradient id="coinGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#A16207"/>
    </radialGradient>
  </defs>

  <!-- Carta de fondo (Verde) -->
  <g transform="translate(15, 10) rotate(-15 45 50)" filter="url(#shadow-card)">
    <rect x="0" y="0" width="70" height="90" rx="4" fill="url(#cardBg2)"/>
    <rect x="5" y="5" width="60" height="80" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <circle cx="35" cy="45" r="15" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Carta intermedia (Rosa) -->
  <g transform="translate(35, 15) rotate(10 45 50)" filter="url(#shadow-card)">
    <rect x="0" y="0" width="70" height="90" rx="4" fill="url(#cardBg1)"/>
    <rect x="5" y="5" width="60" height="80" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    <path d="M35,25 L45,45 L25,45 Z" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Carta principal (Blanca/Clásica) -->
  <g transform="translate(25, 25)" filter="url(#shadow-card)">
    <rect x="0" y="0" width="70" height="90" rx="4" fill="url(#cardBg3)"/>
    <!-- Grid típico de lotería -->
    <rect x="5" y="5" width="60" height="80" rx="2" fill="none" stroke="#0F172A" stroke-width="2"/>
    <line x1="5" y1="31" x2="65" y2="31" stroke="#0F172A" stroke-width="2"/>
    <line x1="5" y1="58" x2="65" y2="58" stroke="#0F172A" stroke-width="2"/>
    <line x1="35" y1="5" x2="35" y2="85" stroke="#0F172A" stroke-width="2"/>
    
    <!-- Imágenes/Iconos en la carta -->
    <circle cx="20" cy="18" r="8" fill="#E65100"/>
    <path d="M42,10 L58,10 L50,26 Z" fill="#3B82F6"/>
    <rect x="12" y="38" width="16" height="12" fill="#8B5CF6"/>
    <circle cx="50" cy="44" r="8" fill="#F59E0B"/>
    <path d="M20,65 L25,75 L15,75 Z" fill="#10B981"/>
    <rect x="42" y="65" width="16" height="12" fill="#EC4899" rx="2"/>
  </g>

  <!-- Fichas/Monedas cayendo -->
  <g filter="url(#shadow-card)">
    <!-- Moneda grande -->
    <ellipse cx="65" cy="55" rx="12" ry="8" fill="url(#coinGrad)" transform="rotate(-20 65 55)"/>
    <path d="M54,52 C54,58 65,65 76,60 L76,64 C65,69 54,62 54,56 Z" fill="#A16207" transform="rotate(-20 65 55)"/>
    
    <!-- Moneda pequeña -->
    <ellipse cx="30" cy="80" rx="8" ry="5" fill="url(#coinGrad)" transform="rotate(15 30 80)"/>
    
    <!-- Moneda en el aire -->
    <ellipse cx="85" cy="25" rx="10" ry="6" fill="url(#coinGrad)" transform="rotate(45 85 25)" filter="url(#glow-coin)"/>
    <path d="M78,20 C78,25 85,30 92,27 L92,30 C85,33 78,28 78,23 Z" fill="#A16207" transform="rotate(45 85 25)"/>
  </g>
</svg>
