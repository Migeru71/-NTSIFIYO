<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="wall-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  
  <!-- Base del laberinto -->
  <rect x="10" y="10" width="100" height="100" rx="8" fill="url(#floorGrad)" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Paredes Exteriores -->
  <path d="M 15 15 L 105 15 L 105 105 L 15 105 Z M 25 25 L 25 95 L 95 95 L 95 25 Z" fill="url(#wallGrad)" filter="url(#wall-shadow)" fill-rule="evenodd"/>
  
  <!-- Paredes Interiores (Cerradas y estructuradas) -->
  <path d="M 25 40 L 45 40 L 45 30 L 35 30 L 35 25 L 55 25 L 55 50 L 25 50 Z" fill="url(#wallGrad)" filter="url(#wall-shadow)"/>
  <path d="M 65 25 L 65 40 L 85 40 L 85 55 L 95 55 L 95 25 Z" fill="url(#wallGrad)" filter="url(#wall-shadow)"/>
  <path d="M 25 65 L 45 65 L 45 80 L 60 80 L 60 95 L 50 95 L 50 75 L 25 75 Z" fill="url(#wallGrad)" filter="url(#wall-shadow)"/>
  <path d="M 75 65 L 95 65 L 95 75 L 75 75 L 75 85 L 95 85 L 95 95 L 65 95 L 65 55 L 75 55 Z" fill="url(#wallGrad)" filter="url(#wall-shadow)"/>
</svg>
