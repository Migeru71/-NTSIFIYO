<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shadow-card" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="gradCardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="gradCardFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Carta de fondo (Volteada) -->
  <g transform="translate(15, 20) rotate(-15 40 40)" filter="url(#shadow-card)">
    <rect x="0" y="0" width="55" height="75" rx="8" fill="url(#gradCardBack)" stroke="#38BDF8" stroke-width="2"/>
    <!-- Patrón del reverso -->
    <circle cx="27.5" cy="37.5" r="15" fill="none" stroke="#38BDF8" stroke-width="2" opacity="0.5"/>
    <path d="M12.5,37.5 L42.5,37.5 M27.5,22.5 L27.5,52.5" stroke="#38BDF8" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Carta Principal (Frente) -->
  <g transform="translate(45, 25) rotate(10 40 40)" filter="url(#shadow-card)">
    <rect x="0" y="0" width="55" height="75" rx="8" fill="#FFFFFF"/>
    <!-- Margen interno -->
    <rect x="4" y="4" width="47" height="67" rx="5" fill="none" stroke="url(#gradCardFront)" stroke-width="2"/>
    <!-- Símbolo o Imagen de la carta -->
    <circle cx="27.5" cy="37.5" r="18" fill="url(#gradCardFront)"/>
    <path d="M27.5,25 L32,32 L40,32 L34,37 L36,45 L27.5,41 L19,45 L21,37 L15,32 L23,32 Z" fill="#FFFFFF"/>
    <!-- Reflejo de cristal -->
    <rect x="0" y="0" width="55" height="30" rx="8" fill="url(#shine)" clip-path="inset(0 0 0 0 round 8px)"/>
  </g>

  <!-- Partículas mágicas -->
  <circle cx="20" cy="90" r="3" fill="#FFD54F" opacity="0.8"/>
  <circle cx="100" cy="30" r="2" fill="#38BDF8" opacity="0.9"/>
  <circle cx="85" cy="100" r="4" fill="#FFD54F" opacity="0.6"/>
</svg>
