<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="fireGlow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity="0.8"/>
    </filter>
  </defs>
  
  <!-- Fire Exhaust -->
  <path d="M 40 70 Q 50 100 60 70 Q 55 75 50 85 Q 45 75 40 70" fill="url(#fireGrad)" filter="url(#fireGlow)">
    <animate attributeName="d" values="M 40 70 Q 50 100 60 70 Q 55 75 50 85 Q 45 75 40 70; M 35 70 Q 50 115 65 70 Q 55 80 50 95 Q 45 80 35 70; M 40 70 Q 50 100 60 70 Q 55 75 50 85 Q 45 75 40 70" dur="0.4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Rocket Fins -->
  <path d="M 35 55 L 20 75 L 35 65 Z" fill="#ef4444"/>
  <path d="M 65 55 L 80 75 L 65 65 Z" fill="#ef4444"/>
  <path d="M 50 60 L 50 75 L 45 65 Z" fill="#b91c1c"/>
  
  <!-- Rocket Body -->
  <path d="M 50 10 Q 70 30 65 65 L 35 65 Q 30 30 50 10" fill="url(#rocketBody)"/>
  
  <!-- Rocket Window -->
  <circle cx="50" cy="40" r="12" fill="#3b82f6" stroke="#475569" stroke-width="4"/>
  <circle cx="47" cy="37" r="4" fill="#ffffff" opacity="0.6"/>
  
  <!-- Space Stars / Speed lines -->
  <line x1="20" y1="10" x2="20" y2="25" stroke="#fde047" stroke-width="2" stroke-linecap="round">
    <animate attributeName="y1" values="10; 25; 10" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="25; 40; 25" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="85" y1="20" x2="85" y2="40" stroke="#fde047" stroke-width="2" stroke-linecap="round">
    <animate attributeName="y1" values="20; 40; 20" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="40; 60; 40" dur="0.6s" repeatCount="indefinite"/>
  </line>
  <line x1="15" y1="50" x2="15" y2="60" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round">
    <animate attributeName="y1" values="50; 70; 50" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="60; 80; 60" dur="0.5s" repeatCount="indefinite"/>
  </line>
</svg>