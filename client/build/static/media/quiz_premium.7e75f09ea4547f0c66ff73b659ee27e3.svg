<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shadow-3d" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>
    <linearGradient id="gradBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Fondo circular resplandeciente -->
  <circle cx="60" cy="60" r="50" fill="url(#bgGlow)" />
  
  <!-- Base cilíndrica (Podio) -->
  <ellipse cx="60" cy="95" rx="40" ry="12" fill="url(#gradBase)" />
  <ellipse cx="60" cy="93" rx="40" ry="12" fill="#38BDF8" opacity="0.3"/>
  <ellipse cx="60" cy="91" rx="40" ry="12" fill="#1E40AF" />

  <!-- Signo de interrogación en 3D -->
  <g transform="translate(0, -10)" filter="url(#shadow-3d)">
    <!-- Cuerpo del signo -->
    <path d="M40,45 C40,30 50,20 60,20 C75,20 85,30 85,45 C85,55 75,65 70,70 L65,75 L65,85 L55,85 L55,70 C60,65 70,55 70,45 C70,35 65,30 60,30 C55,30 50,35 50,45 Z" fill="url(#gradOrange)"/>
    <!-- Punto del signo -->
    <circle cx="60" cy="100" r="8" fill="url(#gradOrange)"/>
    
    <!-- Bisel/Brillo del signo -->
    <path d="M42,45 C42,32 52,22 60,22 C73,22 83,32 83,45 C83,54 74,63 69,68 L64,73 L64,83 L57,83 L57,72 C62,67 71,57 71,45 C71,36 66,32 60,32 C54,32 49,36 49,45 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="100" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Chispas/Estrellas -->
  <path d="M20,30 L25,35 L30,30 L25,25 Z" fill="#FFD54F" filter="blur(1px)"/>
  <path d="M90,20 L93,25 L98,20 L93,15 Z" fill="#38BDF8" filter="blur(0.5px)"/>
  <path d="M85,80 L88,83 L91,80 L88,77 Z" fill="#FFD54F" />
</svg>
