<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="120" height="120" rx="16" fill="url(#bgGrad)" />

  <g stroke="url(#wallGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <!-- Outer boundary with gaps for entrance and exit -->
    <path d="
      M 16 34 L 16 88 A 8 8 0 0 0 24 96 L 88 96 A 8 8 0 0 0 96 88 L 96 74
      M 96 58 L 96 24 A 8 8 0 0 0 88 16 L 24 16 A 8 8 0 0 0 16 24 L 16 18
    "/>
    <!-- Inner Walls -->
    <path d="
      M 36 16 L 36 76
      M 56 16 L 56 36
      M 56 56 L 56 96
      M 76 16 L 76 56
      M 76 76 L 76 96
      M 36 36 L 56 36
      M 76 36 L 96 36
      M 76 56 L 96 56
      M 56 76 L 96 76
    "/>
  </g>

  <!-- Path -->
  <path d="M 6 26 L 26 26 L 26 86 L 46 86 L 46 46 L 66 46 L 66 66 L 86 66 L 106 66" 
        stroke="#F59E0B" stroke-width="3" stroke-dasharray="4, 4" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <circle cx="10" cy="26" r="4" fill="#10B981" />
  <circle cx="102" cy="66" r="4" fill="#F59E0B" />
</svg>