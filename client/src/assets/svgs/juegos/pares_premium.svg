<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shadow-flat" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65100" />
      <stop offset="50%" stop-color="#FFD54F" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>
  </defs>

  <!-- Lasso/Cuerda conectora compleja -->
  <path d="M 30 30 C 80 10, 110 60, 60 60 C 10 60, 40 110, 90 90" fill="none" stroke="url(#ropeGrad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow-flat)"/>
  <path d="M 30 30 C 80 10, 110 60, 60 60 C 10 60, 40 110, 90 90" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/>

  <!-- Carta Izquierda (2D con profundidad) -->
  <g transform="translate(15, 15)" filter="url(#shadow-flat)">
    <rect x="0" y="0" width="30" height="30" rx="6" fill="#FFFFFF"/>
    <rect x="2" y="2" width="26" height="26" rx="4" fill="none" stroke="#E65100" stroke-width="2"/>
    <circle cx="15" cy="15" r="6" fill="#E65100"/>
  </g>

  <!-- Carta Derecha (2D con profundidad) -->
  <g transform="translate(75, 75)" filter="url(#shadow-flat)">
    <rect x="0" y="0" width="30" height="30" rx="6" fill="#FFFFFF"/>
    <rect x="2" y="2" width="26" height="26" rx="4" fill="none" stroke="#38BDF8" stroke-width="2"/>
    <rect x="9" y="9" width="12" height="12" fill="#38BDF8" rx="2"/>
  </g>
</svg>
