<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D" />
      <stop offset="100%" stop-color="#E65100" />
    </linearGradient>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64B5F6" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Resplandor de fondo -->
  <circle cx="60" cy="60" r="45" fill="#E65100" opacity="0.15" filter="url(#glow)" />

  <!-- Pieza Azul (Izquierda) -->
  <g filter="url(#shadow)" transform="translate(15, 25)">
    <path d="M 10 10 L 30 10 C 30 0, 40 0, 40 10 L 50 10 L 50 30 C 60 30, 60 40, 50 40 L 50 60 L 10 60 L 10 40 C 20 40, 20 30, 10 30 Z" 
          fill="url(#gradBlue)" stroke="url(#edgeHighlight)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Pieza Naranja (Derecha) -->
  <g filter="url(#shadow)" transform="translate(55, 25)">
    <path d="M 10 10 L 30 10 C 30 0, 40 0, 40 10 L 50 10 L 50 60 L 10 60 L 10 40 C 20 40, 20 30, 10 30 Z" 
          fill="url(#gradOrange)" stroke="url(#edgeHighlight)" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Brillos -->
  <circle cx="75" cy="30" r="3" fill="#FFFFFF" opacity="0.8" />
  <circle cx="35" cy="80" r="2" fill="#FFFFFF" opacity="0.6" />
</svg>
