  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#bgInactive)" filter="url(#shadowInactive)" />
  <circle cx="50" cy="50" r="32" fill="none" stroke="url(#ringInactive)" stroke-width="8" />
  <line x1="28" y1="28" x2="72" y2="72" stroke="url(#ringInactive)" stroke-width="8" stroke-linecap="round" />
