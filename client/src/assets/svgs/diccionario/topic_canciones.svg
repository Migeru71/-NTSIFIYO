<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <circle cx="32" cy="32" r="30" fill="#EFF6FF" />

  <!-- Ondas sonoras -->
  <path d="M15,32 A18,18 0 0,1 49,32" fill="none" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" />
  <path d="M10,32 A24,24 0 0,1 54,32" fill="none" stroke="#93C5FD" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round" />

  <!-- Corcheas (Notas musicales) -->
  <g transform="translate(18, 15)">
    <!-- Barra superior -->
    <path d="M4,5 L24,2" fill="none" stroke="#1E3A8A" stroke-width="3" stroke-linecap="round" />
    
    <!-- Nota Izquierda -->
    <line x1="5" y1="5" x2="5" y2="28" stroke="#1E3A8A" stroke-width="3" />
    <circle cx="3" cy="28" r="5" fill="#E65100" />
    
    <!-- Nota Derecha -->
    <line x1="23" y1="2" x2="23" y2="25" stroke="#1E3A8A" stroke-width="3" />
    <circle cx="21" cy="25" r="5" fill="#E65100" />
  </g>
</svg>
